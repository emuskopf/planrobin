name: deploy

# Auto-deploy to Cloudflare Pages on every push to main. The hermetic acceptance test
# runs first as a gate — a regression blocks the deploy. Manual runs allowed too.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Tests (gate — override units + DB path == Milestone 0)
        run: npm test

      # Second gate: exercise the batched results query through the SAME driver the Workers runtime
      # uses (postgres.js) against live Supabase. Blocks the deploy if a DB/driver issue would 500
      # the results endpoint — the current site stays live until it's fixed.
      - name: Smoke — batched results path via postgres.js @ live Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/perf/smoke_pg.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # Reads wrangler.toml (output dir `site`, functions/, nodejs_compat, Hyperdrive binding).
          command: pages deploy --branch=main
