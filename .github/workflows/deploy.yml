name: deploy

# Auto-deploy to Cloudflare Pages on every push to main. The hermetic acceptance test
# runs first as a gate — a regression blocks the deploy. Manual runs allowed too.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Acceptance test (gate — no deploy if the DB path regressed)
        run: node tests/acceptance.test.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # Reads wrangler.toml (output dir `site`, functions/, nodejs_compat, Hyperdrive binding).
          command: pages deploy --branch=main
