name: keep-warm

# Supabase's free tier PAUSES a project after ~1 week with no database activity — the next
# visitor would then hit a cold/sleeping DB. This pings a DB-touching endpoint every 3 days
# (well inside that window) so the site never greets someone with a sleeping database.
# Cheapest possible: no secrets, no DB creds — just a cache-busted GET that runs a real query
# (Worker -> Hyperdrive -> Supabase). Fails loud (red) if the site/DB isn't responding.
on:
  schedule:
    - cron: '0 6 */3 * *'   # 06:00 UTC every 3 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/meta (bypasses edge cache -> real DB query)
        run: |
          url="https://planrobin.com/api/meta?warm=$(date +%s)"
          code=$(curl -fsS -o /tmp/meta.json -w '%{http_code}' "$url") || { echo "::error::keep-warm request failed"; exit 1; }
          echo "HTTP $code"; cat /tmp/meta.json
          test "$code" = "200" || { echo "::error::keep-warm got HTTP $code (DB may be paused)"; exit 1; }
          grep -q '"quarter"' /tmp/meta.json || { echo "::error::keep-warm response missing data — DB not answering"; exit 1; }
